<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Form</title>
<style>
  /* Optional: Add your CSS styles here */
  .grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }
  
  .grid-item {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: center;
    cursor: pointer;
  }
  
  .book {
    margin-top: 20px;
    padding: 20px;
    border: 1px solid #ccc;
    background-color: #f9f9f9;
  }
  
  .book form {
    display: flex;
    flex-direction: column;
    max-width: 300px;
  }
  
  .book label {
    margin-bottom: 5px;
  }
  
  .book input, .book textarea {
    margin-bottom: 10px;
    padding: 5px;
    border: 1px solid #ccc;
    border-radius: 3px;
  }
  
  .book button {
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="grid-container">
  <div class="grid-item" onclick="selectTime('11:00 ~ 12:00')">11:00 ~ 12:00</div>
  <div class="grid-item" onclick="selectTime('12:30 ~ 13:30')">12:30 ~ 13:30</div>
  <div class="grid-item" onclick="selectTime('14:00 ~ 15:00')">14:00 ~ 15:00</div>
  <div class="grid-item" onclick="selectTime('15:30 ~ 16:30')">15:30 ~ 16:30</div>
  <div class="grid-item" onclick="selectTime('17:00 ~ 18:00')">17:00 ~ 18:00</div>
  <div class="grid-item" onclick="selectTime('18:00 ~ 19:00')">18:00 ~ 19:00</div>
  <div class="grid-item" onclick="selectTime('20:00 ~ 21:00')">20:00 ~ 21:00</div>
  <div class="grid-item" onclick="selectTime('21:30 ~ 22:30')">21:30 ~ 22:30</div>
</div>

<div class="book" id="book" style="display: none;">
  <form id="bookingForm">
    <label for="selectedTime">선택한 시간:</label><br>
    <input type="text" id="selectedTime" name="selectedTime" readonly><br>

    <label for="name">이름:</label><br>
    <input type="text" id="name" name="name" required placeholder="홍길동"><br>

    <label for="phone">전화번호:</label><br>
    <input type="text" id="phone" name="phone" required placeholder="01000000000" oninput="this.value = this.value.replace(/\D/g, '')"><br>

    <label for="deliver">전달사항:</label><br>
    <textarea id="deliver" name="deliver" placeholder="전달사항을 입력하세요"></textarea><br>

    <button type="submit" class="res">예약</button>
    <button type="button" onclick="closeBookingForm()" class="cancel">취소</button>
  </form>
</div>

<script>
function selectTime(time) {
  document.getElementById('selectedTime').value = time;
  document.getElementById('book').style.display = 'block';
}

function closeBookingForm() {
  document.getElementById('book').style.display = 'none';
}
</script>

</body>
</html>
