<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    .carousel-container {
        width: 500px; /* Set the width of the carousel */
        overflow-x: scroll; /* Enable horizontal scrolling */
        overflow-y: hidden; /* Hide vertical overflow */
        white-space: nowrap; /* Prevent slides from wrapping */
        -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
        margin: 0 auto; /* Center the carousel horizontally */
        position: relative; /* Ensure relative positioning for absolute slides */
    }

    .carousel {
        display: inline-flex; /* Display slides in a row */
        width: max-content; /* Allow slides to stretch to their content */
    }

    .slide {
        flex: 0 0 500px; /* Set slide width to match container */
        margin-right: 10px; /* Optional: Adjust spacing between slides */
        transition: transform 0.5s ease; /* Smooth slide transition */
    }

    .slide img {
        width: 100%; /* Ensure images fill their containers */
    }
</style>
<title>CSS Carousel with Scrollable Only</title>
</head>
<body>
<div class="carousel-container">
    <div class="carousel">
        <div class="slide"><img src="image1.jpg" alt="Slide 1"></div>
        <div class="slide"><img src="image2.jpg" alt="Slide 2"></div>
        <div class="slide"><img src="image3.jpg" alt="Slide 3"></div>
        <!-- Add more slides as needed -->
    </div>
</div>
</body>
</html>
